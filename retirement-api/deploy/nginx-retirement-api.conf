# /etc/nginx/sites-available/retirement-api
# Retirement Data API - Nginx reverse proxy with rate limiting
#
# Install:
#   sudo cp deploy/nginx-retirement-api.conf /etc/nginx/sites-available/retirement-api
#   sudo ln -s /etc/nginx/sites-available/retirement-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Rate limiting: 10 requests/second per IP, burst of 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers (adjust origin for your planner app domain)
    # These supplement Flask-CORS; Nginx handles preflight for cached responses
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Handle preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Block access to sensitive paths
    location ~ /\. {
        deny all;
    }

    # Optional: Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

